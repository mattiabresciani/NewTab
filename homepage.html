<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuova scheda</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <link rel="icon" href="assets/icons/48.png">
</head>
<body>
    <button onclick="apriPopup()" id="iconButton"><img src="assets/settings.svg" draggable="false" alt="Impostazioni" width="44px"></button>

    <div id="popupImpostazioni">
        <h1 align="center">Impostazioni</h1>
        <label style="margin-left: 10%;">Nome: <input id="inputValoreNome" type="text" autocomplete="off"/></label><br><br>
        <h1 align="center">Link</h1>
        <div id="linkListSettings"></div>
        <button onclick="salva()" id="saveButton">Salva</button>
        <button onclick="chiudiPopup()" id="escButton">Annulla</button>
    </div>
    <div id="popupLink">
        <h1 align="center">Aggiungi un link</h1>
        <label style="margin-left: 10%;">Nome: <input id="inputNomeSito" type="text" autocomplete="off" placeholder="Example"/></label><br><br>
        <label style="margin-left: 10%;">URL: <input id="inputUrlSito" type="text" autocomplete="off" placeholder="https://example.com/"/></label><br><br>
        <button onclick="salvaLink()" id="saveButtonn">Salva</button>
        <button onclick="chiudiPopupLink()" id="escButtonn">Annulla</button>
    </div>

    <div id="clock" align="center"></div>
    <div id="date" align="center"></div>
    <div id="welcomeText" align="center"></div>
    <div align="center"><input type="text" id="searchBar" autocomplete="off" placeholder="Cerca qui..."></div>
    <div id="motoriDiRicerca" align="center">
        <button class="search-engine" data-url="https://www.google.com/search?q="><img src="assets/google.svg" width="50px"></button>
        <button class="search-engine" data-url="https://duckduckgo.com/?q="><img src="assets/duckduckgo.svg" width="50px"></button>
        <button class="search-engine" data-url="https://search.yahoo.com/search?p="><img src="assets/yahoo.svg" width="50px"></button>
        <button class="search-engine" data-url="https://yandex.com/search/?text="><img src="assets/yandex.svg" width="50px"></button>
    </div>
    <div align="center" style="margin-top: 30px;">Link salvati</div>
    <div id="linkContainer"></div>


    <script src="script.js"></script>
</body>
</html>
